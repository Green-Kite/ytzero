name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ytzero
  REGISTRY: ${{ vars.REGISTRY }}

jobs:
  docker:
    runs-on: home
    container:
      image: ghcr.io/catthehacker/ubuntu:act-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: meta
        run: |
          if [ -z "${REGISTRY:-}" ]; then
            echo "REGISTRY is not set. Define it as a Gitea Actions variable." >&2
            exit 1
          fi
          short_sha="$(printf '%s' "${GITHUB_SHA}" | cut -c1-7)"
          echo "image=${REGISTRY}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${REGISTRY}/${IMAGE_NAME}:${short_sha}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${REGISTRY}/${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.latest_tag }}
